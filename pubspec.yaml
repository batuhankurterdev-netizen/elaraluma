name: elaralumaoyun
description: Elaraluma oyununun Flutter versiyonu (taşınmış UI bileşenleri)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'  # Flutter 3.24+ için

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  audioplayers: ^6.0.0
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.2.2
  table_calendar: ^3.1.2
  path_provider: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1       # Güncel linter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
