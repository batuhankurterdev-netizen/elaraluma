plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // BURASI ÖNEMLİ: Manifest dosyanla aynı olmalı
    namespace "com.mukaddes.elaraluma" 
    compileSdk 34

    // GitHub'dan gelen şifreleri buraya bağlıyoruz (Bozağız dediğin yer burası, düzeliyor):
   signingConfigs {
        release {
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
            // BURAYI ŞÖYLE DEĞİŞTİR (Dosyayı doğru yerde araması için):
            storeFile rootProject.file('app/key.jks') 
            storePassword System.getenv("KEYSTORE_PASSWORD")
        }
    }

    defaultConfig {
        applicationId "com.mukaddes.elaraluma"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            // BURAYI DEĞİŞTİRDİK: debug yerine release imzasını kullanacak
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source "../.."
}

dependencies {
}
