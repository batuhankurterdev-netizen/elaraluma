name: YeniBuild Android AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force Manual Flutter Install
        run: |
          # 1. Flutter'ı tertemiz indiriyoruz
          git clone https://github.com/flutter/flutter.git -b 3.24.5 --depth 1
          # 2. PATH'e ekliyoruz (ama güvenmiyoruz, aşağıda tam yol kullanacağız)
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

      - name: Build appbundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # 1. BOŞ OLAN local.properties DOSYASINI OTOMATİK DOLDURUYORUZ
          echo "flutter.sdk=$GITHUB_WORKSPACE/flutter" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
          
          # 2. HER KOMUTUN BAŞINA ./flutter/bin/ EKLEYEREK SİSTEMİ ZORLUYORUZ
          ./flutter/bin/flutter clean
          ./flutter/bin/flutter pub get
          
          # 3. BUILD KOMUTUNU DA TAM YOL İLE ÇALIŞTIRIYORUZ
          ./flutter/bin/flutter build appbundle --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/bundle/release/app-release.aab
