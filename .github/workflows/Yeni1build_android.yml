name: YeniBuild Android AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter and Build
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # 1. Flutter'ı indir ve PATH'e ekle
          git clone https://github.com/flutter/flutter.git -b 3.24.5 --depth 1
          export PATH="$PATH:`pwd`/flutter/bin"
          
          # 2. Flutter'ın tam yolunu değişkene al
          FLUTTER_PATH=`pwd`/flutter
          
          # 3. Android local.properties dosyasını ZORLA ve DOĞRU yolla oluştur
          echo "flutter.sdk=$FLUTTER_PATH" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
          
          # 4. Kütüphane bağlarını temizle ve yeniden kur
          flutter clean
          flutter pub get
          
          # 5. Android tarafındaki bozuk kayıtları temizle
          cd android
          ./gradlew clean
          cd ..
          
          # 6. Build işlemini başlat
          flutter build appbundle --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/bundle/release/app-release.aab
