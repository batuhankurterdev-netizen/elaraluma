name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1️⃣ Java Kurulumu (Hataların çoğu buradan kaynaklanıyor)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 2️⃣ Flutter Kurulumu (Manuel clone yerine resmi action kullanın)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

     # 3️⃣ Android SDK lisanslarını kabul et (En güvenli yöntem)
      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      # 4️⃣ Bağımlılıkları Yükle
      - name: Install dependencies
        run: |
          flutter pub get
          # Eğer kod üretimi (build_runner) kullanıyorsan buraya ekleyebilirsin

      # 5️⃣ Build AAB
      - name: Build appbundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # 1. Android'e Flutter'ın yerini zorla öğretiyoruz
          echo "flutter.sdk=$GITHUB_WORKSPACE/flutter" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
          
          # 2. BURASI ÇOK KRİTİK: 'flutter' değil, './flutter/bin/flutter' kullanıyoruz
          # Ve Gradle'ın eski/bozuk kütüphane kayıtlarını siliyoruz
          ./flutter/bin/flutter clean
          ./flutter/bin/flutter pub get
          
          # 3. Android tarafındaki GeneratedPluginRegistrant'ı zorla yeniletiyoruz
          cd android
          ./gradlew clean
          cd ..
          
          # 4. Build komutu (Tam yol kullanarak)
          ./flutter/bin/flutter build appbundle --release --no-tree-shake-icons

      # 6️⃣ Dosyayı Kaydet
      - name: Upload AppBundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/bundle/release/app-release.aab
