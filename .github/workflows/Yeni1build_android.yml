name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Repo'yu çek
      - uses: actions/checkout@v4

      # 2️⃣ Flutter SDK'yı indir
      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.24.5 --depth 1 $GITHUB_WORKSPACE/flutter
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
          echo "FLUTTER_ROOT=$GITHUB_WORKSPACE/flutter" >> $GITHUB_ENV
          flutter --version

      # 3️⃣ Android SDK lisanslarını kabul et
      - name: Accept Android licenses
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      # 4️⃣ Flutter temizleme ve dependency yükleme
      - name: Flutter clean & pub get
        run: |
          flutter clean
          flutter pub get

      # 5️⃣ local.properties oluştur
      - name: Setup local.properties
        run: |
          echo "flutter.sdk=$GITHUB_WORKSPACE/flutter" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties

      # 6️⃣ Build AAB
      - name: Build AppBundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flutter build appbundle --release --no-tree-shake-icons \
            --dart-define=FLUTTER_ROOT=$GITHUB_WORKSPACE/flutter

      # 7️⃣ Upload artifact
      - name: Upload AppBundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
